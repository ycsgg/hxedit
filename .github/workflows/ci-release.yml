name: CI / Release

"on":
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: cargo clippy --all-targets (simple)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --locked --no-default-features -- -D warnings

      - name: cargo clippy --all-targets (default)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo clippy --all-targets (full)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --locked --no-default-features --features full -- -D warnings

      - name: cargo test --all-targets (simple)
        run: cargo test --all-targets --locked --no-default-features

      - name: cargo test --all-targets (default)
        run: cargo test --all-targets --locked

      - name: cargo test --all-targets (full)
        run: cargo test --all-targets --locked --no-default-features --features full

  package:
    name: Package (${{ matrix.target }} / ${{ matrix.variant }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: simple
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_format: tar.gz
          - variant: default
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_format: tar.gz
          - variant: full
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_format: tar.gz
          - variant: simple
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_format: tar.gz
          - variant: default
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_format: tar.gz
          - variant: full
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_format: tar.gz
          - variant: simple
            os: macos-14
            target: aarch64-apple-darwin
            archive_format: tar.gz
          - variant: default
            os: macos-14
            target: aarch64-apple-darwin
            archive_format: tar.gz
          - variant: full
            os: macos-14
            target: aarch64-apple-darwin
            archive_format: tar.gz
          - variant: simple
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_format: zip
          - variant: default
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_format: zip
          - variant: full
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Resolve build flavor args
        id: flavor
        shell: bash
        run: |
          case "${{ matrix.variant }}" in
            simple)
              echo "args=--no-default-features" >> "$GITHUB_OUTPUT"
              ;;
            default)
              echo "args=" >> "$GITHUB_OUTPUT"
              ;;
            full)
              echo "args=--no-default-features --features full" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: cargo build --release
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }} ${{ steps.flavor.outputs.args }}

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $artifact = "hxedit-$version-${{ matrix.variant }}-${{ matrix.target }}"
          $stage = Join-Path $env:RUNNER_TEMP $artifact
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          $binary = if ("${{ runner.os }}" -eq "Windows") { "hxedit.exe" } else { "hxedit" }
          Copy-Item "target/${{ matrix.target }}/release/$binary" -Destination (Join-Path $stage $binary)
          Copy-Item "README.md" -Destination (Join-Path $stage "README.md")

          New-Item -ItemType Directory -Path dist -Force | Out-Null

          if ("${{ matrix.archive_format }}" -eq "zip") {
            Compress-Archive -Path $stage -DestinationPath "dist/$artifact.zip" -Force
          } else {
            tar -C $env:RUNNER_TEMP -czf "dist/$artifact.tar.gz" $artifact
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Extract changelog for current version
        id: changelog
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Extract the changelog section for this version
          # The pattern looks for "## [VERSION]" and captures until the next "## [" or end of file
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ { in_section = 0 }
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md)

          # Write to file for multiline output
          echo "$CHANGELOG" > /tmp/release_body.md

          # Prepend header
          echo "## What's Changed" > /tmp/release_header.md
          echo "" >> /tmp/release_header.md

          cat /tmp/release_header.md /tmp/release_body.md > /tmp/full_release_notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/full_release_notes.md
          fail_on_unmatched_files: true
          files: |
            dist/*
