name: CI / Release

"on":
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: cargo clippy --all-targets
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test --all-targets
        run: cargo test --all-targets --locked

  package:
    name: Package (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_format: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_format: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_format: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $artifact = "hxedit-$version-${{ matrix.target }}"
          $stage = Join-Path $env:RUNNER_TEMP $artifact
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          $binary = if ("${{ runner.os }}" -eq "Windows") { "hxedit.exe" } else { "hxedit" }
          Copy-Item "target/${{ matrix.target }}/release/$binary" -Destination (Join-Path $stage $binary)
          Copy-Item "README.md" -Destination (Join-Path $stage "README.md")

          New-Item -ItemType Directory -Path dist -Force | Out-Null

          if ("${{ matrix.archive_format }}" -eq "zip") {
            Compress-Archive -Path $stage -DestinationPath "dist/$artifact.zip" -Force
          } else {
            tar -C $env:RUNNER_TEMP -czf "dist/$artifact.tar.gz" $artifact
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*
