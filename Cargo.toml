[package]
name = "hxedit"
version = "0.1.0"
edition = "2021"
description = "A terminal hex editor optimized for large files"
license = "MIT"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.28"
memchr = "2.7"
ratatui = "0.29"
supports-color = "3"
thiserror = "2.0"

[dev-dependencies]
pretty_assertions = "1.4"
tempfile = "3.14"

[profile.release]
lto = true
codegen-units = 1
